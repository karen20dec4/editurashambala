<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MARS Website</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      overflow: hidden;
    }

    #intro {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #FFF;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: all 1s ease-in-out;
    }

    #intro img {
      width: 35%;
      height: auto;
      transition: transform 1.5s ease-in-out, opacity 1.5s ease-in-out;
    }

    #intro.zoom-out {
      opacity: 0;
      pointer-events: none;
    }

    #intro.zoom-out img {
      transform: scale(10);
      opacity: 0;
    }

    main {
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }

    main.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="intro">
    <img src="Logo-yantra-shambala.png" alt="MARS Logo">
  </div>

  <main>
    <h1>Se continua cu site-ul prestashop 9</h1>
    <p>Aici începe conținutul tău.</p>
  </main>

  <script>
    window.addEventListener('load', () => {
      const intro = document.getElementById('intro');
      const main = document.querySelector('main');

      setTimeout(() => {
        intro.classList.add('zoom-out');
        main.classList.add('show');
        document.body.style.overflow = 'auto';
      }, 1000); // start zoom after 1s
    });
  </script>
</body>
</html>
